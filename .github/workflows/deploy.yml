name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t rooftop-app:latest .
          docker save rooftop-app:latest | gzip > rooftop-app.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: rooftop-app.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 121.4.18.133 >> ~/.ssh/known_hosts

      - name: Copy image to server
        run: |
          scp rooftop-app.tar.gz root@121.4.18.133:/opt/rooftop/

      - name: Deploy on server
        run: |
          ssh root@121.4.18.133 "cd /opt/rooftop && ./deploy.sh deploy-only"

      - name: Check deployment status
        run: |
          ssh root@121.4.18.133 "docker ps --filter 'name=rooftop' --format 'table {{.Names}}\t{{.Status}}'"
