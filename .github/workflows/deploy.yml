name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 121.4.18.133 >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh root@121.4.18.133 "cd /opt/rooftop && ./deploy.sh"

      - name: Check deployment status
        run: |
          ssh root@121.4.18.133 "docker ps --filter 'name=rooftop' --format 'table {{.Names}}\t{{.Status}}'"
